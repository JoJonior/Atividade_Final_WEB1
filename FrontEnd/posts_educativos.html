<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}
</script>

<script>
  // LISTAR
  async function carregarPosts(){
      const res = await fetch("/api/posts");
      const posts = await res.json();

      const container = document.getElementById("grid_posts");
      container.innerHTML="";

      posts.forEach(post=>{
          const div = document.createElement("div");
          div.className="card";
          
          div.innerHTML=`
         
              <a href="https://www.youtube.com/embed/${post.video_url}"  class="post_card"> 
              <h3>${post.titulo}</h3>
              <img src="https://img.youtube.com/vi/${post.video_url}/hqdefault.jpg">
              <p>${post.conteudo}</p>
              
              </a>

          `;



          container.appendChild(div);
      });
  }

  carregarPosts();

</script>
