<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazer Dencunia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="{{ url_for('static', path='/css/stilo_01.css') }}" rel="stylesheet">

    <link href="{{ url_for('static', path='/css/forms.css') }}" rel="stylesheet">

    <link href="static/css/alert.css" rel="stylesheet" >
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
    <style>
        #map { height: 300px; width: 100%; border-radius: 8px; margin-bottom: 15px; }
        
    </style>

</head>

<nav>
    <div class="banner">
        <img src="static/Assets/Logo.png" width="15%" alt="Logo">
    </div>


  <div class="topnav" id="myTopnav">
    <a href="/">Inicio</a>
    <a href="mapa_coleta">Mapa de Coleta</a>
    <a href="fazer_denuncia"  class="active">Fazer Denuncia</a>
    <a href="posts_educativos">Videos Educativos  </a>
    <a href="javascript:void(0);" class="icon" onclick="myFunction()">
      <i class="fa fa-bars"></i>
    </a>
  </div>

</nav>
<body>

<div class="container_CENTRAL_DENUNCIA">

    {% if sucesso == 1 %}

    <div class="alert">
      <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span> 
      <strong>Sucesso!</strong> Denúncia enviada!.
    </div>
    
    {% endif %}
    <div class="container_forms">
        <h2>Fazer Denúncia</h2>
        <form action="/fazer_denuncia" method="post" enctype="multipart/form-data">

            <label for="local">Local da ocorrência</label>
            <input type="text" id="local" name="local" placeholder="Endereço ou ponto de referência" required>

            <label for="data">Data da ocorrência</label>
            <input type="date" id="data" name="data">

            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="4" placeholder="Descreva o ocorrido..." required></textarea>
            <label>Selecione o local no mapa:</label>
            <div id="map"></div>

            <input type="hidden" id="lat" name="latitude">
            <input type="hidden" id="lng" name="longitude">

            <label for="imagens">Anexar imagens (opcional)</label>
            <input type="file" id="imagens" name="imagens" accept="image/*" multiple onchange="previewImagens()">
            <button type="submit">Enviar Denúncia</button>
            <div id="preview"></div>
        </form>
    </div>
</div>

    
</body>

<footer>
  <p>© 2026 GreenUp. Todos os direitos reservados.</p>

</footer>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}



// Inicializa o mapa (focado em uma coordenada central da sua cidade)
var map = L.map('map').setView([-4.9162051467865355 , -49.08051612365923], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

var marker;

map.on('click', function(e) {
    var lat = e.latlng.lat;
    var lng = e.latlng.lng;

    // Atualiza ou cria o marcador
    if (marker) {
        marker.setLatLng(e.latlng);
    } else {
        marker = L.marker(e.latlng).addTo(map);
    }

    // Salva nos inputs escondidos
    document.getElementById('lat').value = lat;  // -4.9162051467865355  // lo -49.08051612365923
    document.getElementById('lng').value = lng;
    console.log("Coordenadas selecionadas: " + lat + ", " + lng);
});
</script>



<script>
 
function previewImagens() {
    const preview = document.getElementById('preview');
    preview.innerHTML = "";
    const files = document.getElementById('imagens').files;

    for (let i = 0; i < files.length; i++) {
        const reader = new FileReader();

        reader.onload = function(e) {
            const img = document.createElement("img");
            img.src = e.target.result;
            img.style.width = "100px";
            img.style.margin = "5px";
            preview.appendChild(img);
        }

        reader.readAsDataURL(files[i]);
    }
}
</script>
</html>
