<div id="modalPostEducativo" class="modal-educativo">
  <div class="modal-educativo-content">
      <span class="fechar-modal" onclick="fecharModalPost()">&times;</span>
      <div id="videoContainer">
          </div>
      <div class="modal-info">
          <h2 id="modalPostTitulo"></h2>
          <p id="modalPostConteudo"></p>
      </div>
  </div>
</div>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}
</script>

<script>
  // LISTAR
  async function carregarPosts() {
    const res = await fetch("/api/posts");
    const posts = await res.json();
    const container = document.getElementById("grid_posts");
    container.innerHTML = "";

    posts.forEach(post => {
        const div = document.createElement("div");
        div.className = "card";

        // Adicionamos o onclick e prevenimos o comportamento padrão do link
        div.innerHTML = `
            <a href="javascript:void(0)" class="post_card" onclick='abrirModalPost(${JSON.stringify(post)})'> 
                <h3>${post.titulo}</h3>
                <img src="https://img.youtube.com/vi/${post.video_url}/hqdefault.jpg">
                <p>${post.conteudo}</p>
            </a>
        `;
        container.appendChild(div);
    });
}

// Função para abrir o modal e preencher os dados
function abrirModalPost(post) {
    const modal = document.getElementById("modalPostEducativo");
    const videoContainer = document.getElementById("videoContainer");
    
    document.getElementById("modalPostTitulo").innerText = post.titulo;
    document.getElementById("modalPostConteudo").innerText = post.conteudo;
    
    // Inserimos o iframe dinamicamente (para o vídeo não carregar antes da hora)
    videoContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${post.video_url}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
    
    modal.style.display = "flex";
}

// Função para fechar e parar o vídeo
function fecharModalPost() {
    const modal = document.getElementById("modalPostEducativo");
    const videoContainer = document.getElementById("videoContainer");
    
    modal.style.display = "none";
    videoContainer.innerHTML = ""; // Remove o iframe para parar o som do vídeo
}

// Fechar se clicar fora do conteúdo branco
window.onclick = function(event) {
    const modal = document.getElementById("modalPostEducativo");
    if (event.target == modal) {
        fecharModalPost();
    }
}

  carregarPosts();

</script>
</html>
