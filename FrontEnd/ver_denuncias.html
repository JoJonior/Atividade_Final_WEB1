<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - Denuncias</title>
    <link href="/static/css/stilo_01.css" rel="stylesheet" >
    <link href="/static/css/denuncias_cards.css" rel="stylesheet" >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
</head>
<body>
    <nav> 
    <div class="topnav" id="myTopnav">  
        <a href="/ADMIN/Posts">Posts</a>
        <a href="/ADMIN/denuncias"  class="active">Ver Denuncias</a>
        <a href="/">Ir Para Site</a>
        <a href="/logout">Loggout</a>
        <a href="javascript:void(0);" class="icon" onclick="myFunction()">
          <i class="fa fa-bars"></i>
        </a>
      </div>
    </nav>


    <div class="Denuncias_container">
        <h1>Denúncias Recebidas</h1>
    <div id="lista-denuncias"></div>
    </div>

    <div id="modalImagem" class="modal">
        <span class="fechar" onclick="fecharImagem()">&times;</span>
        <img class="modal-conteudo" id="imgGrande">
      </div>
</body>

<script>
    async function carregarDenuncias() {
      const res = await fetch("/api/denuncias");
      const denuncias = await res.json();
    
      const container = document.getElementById("lista-denuncias");
      container.innerHTML = "";
    
      denuncias.forEach(denuncia => {
        const div = document.createElement("div");
        div.classList.add("card");
    
        let imagensHTML = "";
    
        denuncia.imagens.forEach(img => {

            img_caminho = img.caminho.replace("FrontEnd", "");
            imagensHTML += `
            <img src="${img_caminho}" onclick="abrirImagem('${img_caminho}')">
            `;
            console.log(img_caminho)
        });

        
    
        div.innerHTML = `
          <h3>${denuncia.descricao}</h3>
          <p>${denuncia.localizacao}</p>
          <div class="preview">
            ${imagensHTML}
          </div>
          <p>${denuncia.data_ocorrencia}</p>
        `;
    
        container.appendChild(div);
      });
    }
    
    carregarDenuncias();
    </script>

<script id="i4w8kc">
    function abrirImagem(caminho) {
      const modal = document.getElementById("modalImagem");
      const img = document.getElementById("imgGrande");
    
      modal.style.display = "block";
      img.src = caminho;
    }
    
    function fecharImagem() {
      document.getElementById("modalImagem").style.display = "none";
    }
    
    // fechar clicando fora da imagem
    window.onclick = function(event) {
      const modal = document.getElementById("modalImagem");
      if (event.target === modal) {
        modal.style.display = "none";
      }
    }
    </script>

    
    <script>
        function myFunction() {
        var x = document.getElementById("myTopnav");
        if (x.className === "topnav") {
            x.className += " responsive";
        } else {
            x.className = "topnav";
        }
        }
        </script>
</html>
